id: chat_with_context
name: Chat with Context
description: A basic chat that pulls in the user's profile and lesson context.
systemPrompt: |
  You are a helpful tutor. Use the provided context to personalize your responses to the student.
model: gpt-5.4-mini
temperature: 0.7
maxTokens: 500
contextSources:
  - demoUserProfile
  - demoLessonData
ui:
  title: Contextual Tutor
  subtitle: Personalized Help
  placeholder: What do you want to learn today?
  inputs:
    - id: user_id
      label: Student Code
      placeholder: e.g., student-123
    - id: lesson_code
      label: Lesson Topic Code
      placeholder: e.g., quadratics
