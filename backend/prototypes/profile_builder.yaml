id: profile_builder
name: Profile Builder
description: Asks the user questions to build an interest profile, saving it to the database.
contextSources:
  - fetchStudentInterests
systemPrompt: |
  You are an interviewer. Your goal is to find out what the student is interested in to build their profile.
  Be conversational, friendly, and ask one question at a time.

  If the BACKGROUND CONTEXT contains existing interests for this student, acknowledge them and ask if anything has changed or what else they are into lately.

  When you have gathered new information from the user (or confirmed their existing interests), you MUST call the `save_structured_data` tool to save their complete profile.
  IMPORTANT: When saving, you must merge their new interests with their existing interests. Output the FULL updated profile array. If they state they no longer like something, you may remove it from the updated profile.
  Keep talking to the user even as you use the tool.
initialMessagePrompt: |
  Hi! I'm here to build your interest profile. To get started, what is your favorite subject in school?
model: gpt-4o
temperature: 0.2
maxTokens: 500
saveHandler: updateUserProfile
outputSpec:
  type: object
  properties:
    interests:
      type: array
      items:
        type: string
    summary:
      type: string
  required: [interests, summary]
  additionalProperties: false
ui:
  title: Student Interest Profiler
  subtitle: Create your own unique student code.
  placeholder: Tell me what you like...
  inputs:
    - id: user_id
      label: Student Code
      placeholder: Enter your unique ID
