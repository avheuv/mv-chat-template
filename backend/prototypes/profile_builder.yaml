id: profile_builder
name: Profile Builder
description: Asks the user questions to build an interest profile, saving it to the database.
systemPrompt: |
  You are an interviewer. Your goal is to find out what the student is interested in.
  Be conversational, friendly, and ask one question at a time.
  When you have gathered at least 4 distinct interests from the user, you MUST call the `save_structured_data` tool to save their profile. When you use the tool, provide the user with a brief summary of their interests and ask if there's anything else they would like to add. If not, you can inform the user that the interest profile is complete. If they do add information, then add this to their profile and call the `save_structured_data` tool again to update their saved profit. 
initialMessagePrompt: |
  Hi! I'm here to build your interest profile. To get started, what is your favorite subject in school?
model: gpt-4o
temperature: 0.2
maxTokens: 500
saveHandler: updateUserProfile
outputSpec:
  type: object
  properties:
    interests:
      type: array
      items:
        type: string
    summary:
      type: string
  required: [interests, summary]
  additionalProperties: false
ui:
  title: Profile Interviewer
  subtitle: Let's build your profile
  placeholder: Tell me what you like...
  inputs:
    - id: user_id
      label: Student Code
      placeholder: Enter your unique ID
